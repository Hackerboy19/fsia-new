<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Miss Universe 2026</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--primary:#0a0e27;--accent:#ffd700;--secondary:#6a0dad}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0a0e27,#1a1a3e);color:#fff;min-height:100vh}h1,h2,h3{font-family:'Playfair Display',serif}.container{width:min(1100px,94%);margin:0 auto}@keyframes cosmicTwinkle{0%,100%{opacity:.3;transform:scale(1) rotate(0deg)}50%{opacity:1;transform:scale(1.2) rotate(180deg)}}@keyframes starGlow{0%,100%{text-shadow:0 0 15px var(--accent)}50%{text-shadow:0 0 30px var(--accent)}}@keyframes slideFromCosmos{from{opacity:0;transform:translateY(-50px)}to{opacity:1;transform:translateY(0)}}@keyframes floatInSpace{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}header{background:linear-gradient(135deg,rgba(10,14,39,.9),rgba(26,26,62,.9));border-bottom:2px solid var(--accent);padding:1rem 0;position:sticky;top:0;z-index:60;animation:slideFromCosmos .8s}.logo{display:flex;align-items:center;gap:.8rem;color:var(--accent);font-weight:700}.logo img{width:50px;animation:floatInSpace 6s infinite}.hero{background:radial-gradient(ellipse,#1a1a3e,#0a0e27);padding:80px 0;text-align:center;position:relative;animation:slideFromCosmos 1s}
.hero::before{content:'✨ ⭐ ✨';position:absolute;top:15%;left:10%;font-size:2.5rem;opacity:.15;animation:cosmicTwinkle 4s infinite}.hero-content{position:relative;z-index:1}.hero h1{font-size:3.2rem;margin-bottom:1rem;animation:starGlow 2.5s infinite}.hero p{font-size:1.2rem;opacity:.95;margin-bottom:2rem;animation:slideFromCosmos .8s .3s both}.hero-stats{display:flex;justify-content:center;gap:3rem;margin-top:2rem;flex-wrap:wrap}.stat{animation:slideFromCosmos .8s;animation-fill-mode:both}.stat:nth-child(1){animation-delay:.4s}.stat:nth-child(2){animation-delay:.6s}.stat:nth-child(3){animation-delay:.8s}.stat-number{font-size:2rem;display:block;color:var(--accent)}.section-title{text-align:center;margin-bottom:3rem;font-size:2.2rem;color:var(--accent);animation:starGlow 2.5s infinite}.form-container{background:linear-gradient(135deg,rgba(26,26,62,.9),rgba(50,30,80,.9));border-radius:20px;padding:3rem;box-shadow:0 0 50px rgba(255,215,0,.2);animation:slideFromCosmos 1s;border:2px solid var(--accent);max-width:700px;margin:0 auto;position:relative}
.form-header h2{color:var(--accent);animation:starGlow 2.5s infinite}.form-group input,.form-group select{border:2px solid var(--accent);background:rgba(26,26,62,.7);color:#fff}.form-group input:focus{box-shadow:0 0 0 3px rgba(255,215,0,.15)}.requirements{background:rgba(106,10,173,.2)}.requirements h3{color:var(--accent);animation:starGlow 2.5s infinite}.req-list li:before{animation:cosmicTwinkle 2s infinite}.submit-btn{background:linear-gradient(135deg,var(--accent),#ffed4e);color:var(--primary)}.submit-btn:hover{box-shadow:0 12px 36px rgba(255,215,0,.5)}</style></head><body><header><div class="container"><a href="index.html" class="logo"><img src="logo.gif"><span>Forever Star</span></a></div></header><section class="hero"><div class="container"><h1>✨ Miss Universe 2026</h1><p>Cosmic Beauty</p><div class="hero-stats"><div class="stat"><span class="stat-number">195+</span></div><div class="stat"><span class="stat-number">80+</span></div><div class="stat"><span class="stat-number">∞</span></div></div></div></section><section class="form-section" style="padding:60px 0"><div class="container"><h2 class="section-title">⭐ Apply Now</h2><div class="form-container"><div class="form-header"><h2>Miss Universe</h2></div><form id="registrationForm" onsubmit="submitForm(event)"><div class="form-group"><label>First Name <span class="required">*</span></label><input type="text" name="firstName" required></div><div class="form-group"><label>Phone <span class="required">*</span></label><input type="tel" name="phone" maxlength="10" required></div><div class="form-group"><label>Email <span class="required">*</span></label><input type="email" name="email" required></div><button type="submit" class="submit-btn">✨ Register</button></form></div></div></section></body></html>
